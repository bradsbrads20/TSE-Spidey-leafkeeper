<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uphill Run 2026</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        header {
            padding: 30px 0;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #00ffcc;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .details {
            font-size: 1.2em;
            margin: 10px 0;
        }

        .poster {
            margin-top: 20px;
        }

        .poster img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #00ffcc;
        }

        footer {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: #00ffcc;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>UPHILL RUN 2026</h1>
            <p>Challenge Yourself. Conquer the Climb.</p>
        </header>

        <div class="event-card">
            <p class="details"><strong>🏃 What:</strong> Uphill Run Event</p>
            <p class="details"><strong>📅 When:</strong> April 18, 2026</p>
            <p class="details"><strong>📍 Where:</strong> Mabuhay,Tandag City,Surigao,Del,sur</p>

            <button onclick="alert('Sexy Pace')">
                SEE YOU!
            </button>

            <div class="poster">
                <!-- Replace "poster.jpg" with your actual image file -->
                <img src="poster.jpg" alt="Event Poster">
            </div>
        </div>

        <footer>
            <p>© IMMORTAL RUNNERS</p>
        </footer>

    </div>

</body>
</html>
